# Managed by stack-keeper (infra/repos). When flake.nix is missing, runs nix flake init -t from std-dev-env.
name: Stack Keeper flake bootstrap

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: stack-keeper-flake-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          install_options: --no-daemon

      - name: Configure Nix (flakes + GitHub token for private flakes)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.config/nix"
          {
            echo "experimental-features = nix-command flakes"
            token="${{ secrets.STD_DEV_ENV_READONLY }}"
            if [[ -z "$token" ]]; then
              token="${{ secrets.GITHUB_TOKEN }}"
            fi
            echo "access-tokens = github.com=$token" >> "$HOME/.config/nix/nix.conf"
          }

      - name: Flake init from std-dev-env
        shell: bash
        env:
          FLAKE_TEMPLATE_URI: github:hennersz/std-dev-env/main#nix
        run: |
          set -euo pipefail
          if [[ -f flake.nix ]]; then
            echo "flake.nix already present; skipping"
            exit 0
          fi
          nix flake init -t "$FLAKE_TEMPLATE_URI"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "chore: initialize flake from std-dev-env template"
          git push
